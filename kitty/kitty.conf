# Kitty Conf File
# Edited by: @Logan-Eager

##### Font stuff #####
font_family	JetBrains MonoNL Nerd Font
bold_font	auto
italic_font	auto
font_size	12.0
bold_italic_font	auto

# Turns off close confirmation
confirm_os_window_close 0

# Terminal integration
shell_integration on

# Delete word
map ctrl+backspace send_text all \x17

# Kitty theme: (monokai soda)
include current-theme.conf

# Hyprland Config File
# Edited by: @Logan-Eager

##### App constants #####
$mainMod = SUPER    # Windows key
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun -show-icons
$webBrowser = brave
$systemMonitor = kitty btop


##### SETUP #####

# On startup
exec-once = waybar
exec-once = mako
exec-once = blueman-applet
exec-once = awww-daemon
# Gnome keyring tweak
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start gnome-keyring-daemon.service

# Hyprland tweaks for nvidia GPU
env = LIBVA_DRIVER_NAME, nvidia
env = __GLX_VENDOR_LIBRARY_NAME, nvidia

# Assign monitor settings
monitor = DP-1, 1920x1080@164.96Hz, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60.00Hz, -1920x0, 1

# Assign workspaces
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1


##### BINDS #####

# Software
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $webBrowser
bind = $mainMod, M, exec, $systemMonitor

# Kill window
bind = $mainMod, C, killactive,

# Screenshot
bind = $mainMod, S, exec, grim -g "$(slurp)" - | satty --filename - --output-filename ~/Pictures/Screenshots/screenshot_$(date +%Y-%m-%d_%H-%M-%S).png 

# Move focus in dir (vim and arrows)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window in dir (vim and arrows)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move focus to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3


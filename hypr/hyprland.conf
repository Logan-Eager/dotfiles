# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

# App constants
$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show run

# On startup
exec-once = waybar
exec-once = mako
exec-once = blueman-applet
exec-once = awww-daemon
 
# Default Binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, exec, brave

# Nav Binds
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2

# Show active windows
bind = ALT, Tab, exec, rofi -show window

# Workspace Binds
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Hyprland tweaks for nvidia GPU
env = LIBVA_DRIVER_NAME, nvidia
env = __GLX_VENDOR_LIBRARY_NAME, nvidia

# Assign monitor settings
monitor = DP-1, 1920x1080@164.96Hz, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60.00Hz, -1920x0, 1

# Assign workspaces
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:HDMI-A-1

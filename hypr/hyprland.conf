# Hyprland Config File
# Edited by: @Logan-Eager

##### App constants #####
$mainMod = SUPER    # Windows key
$terminal = kitty
$fileManager = kitty yazi
$menu = rofi -show drun -show-icons
$webBrowser = brave
$systemMonitor = kitty btop


##### SETUP #####
exec-once = uwsm finalize
exec-once = waybar
exec-once = mako
exec-once = blueman-applet
exec-once = awww-daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = udiskie &

# Hyprland tweaks for nvidia GPU
env = LIBVA_DRIVER_NAME, nvidia
env = __GLX_VENDOR_LIBRARY_NAME, nvidia

# Assign monitor settings 
monitor = DP-1, 1920x1080@164.96Hz, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60.00Hz, -1920x0, 1

# Assign workspaces
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1


##### BINDS #####

# Software
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $webBrowser
bind = $mainMod, M, exec, $systemMonitor

# Toggle fullscreen for window
bind = $mainMod, F, fullscreen

# Kill window
bind = $mainMod SHIFT, C, killactive,

# Mouse move and resize window
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Screenshot
bind = $mainMod, S, exec, grim -g "$(slurp)" - | satty --filename - --output-filename ~/Pictures/Screenshots/screenshot_$(date +%Y-%m-%d_%H-%M-%S).png 

# Volume keys
bindle = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindle = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Media keys
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next

# Emoji picker
bind = $mainMod, semicolon, exec, rofi -show emoji

# Clipboard manager
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Move focus in dir (vim and arrows)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window in dir (vim and arrows)
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Move focus to workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3

# Puts debug at bottom :)
debug {
    error_position = 1
}


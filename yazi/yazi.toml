# Yazi configuration file
# Editor: @Logan-Eager

[manager]
show_symlink = true

# Not feelin it rn 🤷
# [mgr]
# show_hidden = true

# Read me previews
[[plugin.prepend_previewers]]
url = "*.md"
run = "glow"

# Media info previews
[[plugin.prepend_previewers]]
mime = "video/*"
run = "mediainfo"
[[plugin.prepend_previewers]]
mime = "audio/*"
run = "mediainfo"

# Editor hack
[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" }
]
